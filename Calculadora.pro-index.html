# Calculadora-pro
Es una calculadora 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Pro+</title>
  <style>
    :root {
      --bg-overlay: rgba(2, 6, 23, 0.55);
      --panel: rgba(2, 6, 23, 0.9);
      --display-bg: #020617;
      --display-text: #00eaff;
      --btn: #1f2937;
      --btn-hover: #374151;
      --op: #334155;
      --op-text: #38bdf8;
      --danger: #ef4444;
      --danger-hover: #f87171;
      --ok: #22c55e;
      --ok-hover: #4ade80;
      --accent: #7c3aed;
      --accent-hover: #8b5cf6;
    }

    body.light {
      --bg-overlay: rgba(255, 255, 255, 0.55);
      --panel: rgba(255, 255, 255, 0.88);
      --display-bg: #e2e8f0;
      --display-text: #0f172a;
      --btn: #cbd5e1;
      --btn-hover: #94a3b8;
      --op: #93c5fd;
      --op-text: #0c4a6e;
      --danger: #f87171;
      --danger-hover: #ef4444;
      --ok: #86efac;
      --ok-hover: #4ade80;
      --accent: #c4b5fd;
      --accent-hover: #a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.8s ease-in-out;
      overflow: hidden;
      position: relative;
      padding: 16px;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      align-items: stretch;
      flex-wrap: wrap;
      justify-content: center;
    }

    .calculadora {
      background: var(--panel);
      padding: 14px;
      border-radius: 16px;
      box-shadow: 0 0 28px rgba(0, 0, 0, 0.45);
      width: min(100%, 360px);
    }

    .topbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .topbar button {
      flex: 1;
      height: 34px;
      font-size: 13px;
      border-radius: 8px;
    }

    #display {
      width: 100%;
      height: 56px;
      background: var(--display-bg);
      color: var(--display-text);
      font-size: 25px;
      text-align: right;
      padding: 8px;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 2px solid var(--display-text);
      outline: none;
      text-shadow: 0 0 10px var(--display-text);
    }

    .botones {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      height: 46px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      background: var(--btn);
      color: #e5e7eb;
      cursor: pointer;
      transition: 0.18s;
      font-weight: 600;
    }

    button:hover { background: var(--btn-hover); transform: scale(1.03); }

    .operador { background: var(--op); color: var(--op-text); }
    .igual { background: var(--ok); color: #fff; }
    .igual:hover { background: var(--ok-hover); }
    .clear { background: var(--danger); }
    .clear:hover { background: var(--danger-hover); }
    .backspace, .action { background: var(--accent); color: #fff; }
    .backspace:hover, .action:hover { background: var(--accent-hover); }

    .history {
      width: min(100%, 220px);
      background: var(--panel);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.3);
      max-height: 420px;
      display: flex;
      flex-direction: column;
    }

    .history h3 {
      margin: 0 0 8px;
      color: var(--display-text);
      font-size: 15px;
    }

    #historyList {
      margin: 0;
      padding: 0;
      list-style: none;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    #historyList li {
      background: rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      color: #e2e8f0;
      word-break: break-word;
      cursor: pointer;
    }

    #historyList li:hover {
      background: rgba(148, 163, 184, 0.35);
    }

    .light #historyList li { color: #0f172a; }

    @media (max-width: 640px) {
      .wrap { width: 100%; }
      .calculadora { width: 100%; max-width: 400px; }
      .history { width: 100%; max-width: 400px; max-height: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="calculadora">
      <div class="topbar">
        <button class="action" onclick="toggleTheme()">Tema</button>
        <button class="action" onclick="changeBackgroundNow()">Fondo</button>
        <button class="action" onclick="useAns()">ANS</button>
      </div>

      <input type="text" id="display" disabled>

      <div class="botones">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="backspace" onclick="backspace()">⌫</button>
        <button onclick="add('(')">(</button>
        <button onclick="add(')')">)</button>
        <button class="operador" onclick="add('/')">÷</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="operador" onclick="add('*')">×</button>
        <button onclick="percent()">%</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="operador" onclick="add('-')">−</button>
        <button onclick="square()">x²</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="operador" onclick="add('+')">+</button>
        <button onclick="cube()">x³</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button onclick="add('pi')">π</button>
        <button onclick="sqrtValue()">√</button>
        <button onclick="fourthPower()">x⁴</button>

        <button onclick="add('e')">e</button>
        <button onclick="add('ln(')">ln</button>
        <button onclick="add('log(')">log</button>
        <button onclick="add('^')">xʸ</button>
        <button class="igual" onclick="calculate()">=</button>
      </div>
    </div>

    <aside class="history">
      <h3>Historial</h3>
      <ul id="historyList"></ul>
    </aside>
  </div>

  <script>
    const display = document.getElementById("display");
    const historyList = document.getElementById("historyList");
    let lastAnswer = null;
    const MAX_INPUT_LENGTH = 120;
    const MAX_HISTORY = 12;

    const randomBackgrounds = [
      "https://picsum.photos/1920/1080?random=11",
      "https://picsum.photos/1920/1080?random=12",
      "https://picsum.photos/1920/1080?random=13",
      "https://picsum.photos/1920/1080?random=14",
      "https://picsum.photos/1920/1080?random=15",
      "https://picsum.photos/1920/1080?random=16"
    ];

    function setRandomBackground() {
      const idx = Math.floor(Math.random() * randomBackgrounds.length);
      document.body.style.backgroundImage = `url('${randomBackgrounds[idx]}')`;
    }

    function changeBackgroundNow() {
      setRandomBackground();
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }

    function useAns() {
      if (lastAnswer !== null) {
        add(String(lastAnswer));
      }
    }

    function add(value) {
      if (display.value.length >= MAX_INPUT_LENGTH) return;
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function backspace() {
      display.value = display.value.slice(0, -1);
    }

    function addToHistory(expr, result) {
      const li = document.createElement("li");
      li.textContent = `${expr} = ${result}`;
      li.title = "Click para reutilizar resultado";
      li.addEventListener("click", () => {
        display.value = String(result);
      });
      historyList.prepend(li);
      while (historyList.children.length > MAX_HISTORY) {
        historyList.removeChild(historyList.lastChild);
      }
    }

    function tokenize(expression) {
      const tokens = [];
      let i = 0;
      const cleaned = expression.replace(/\s+/g, "");

      while (i < cleaned.length) {
        const ch = cleaned[i];

        if (/\d/.test(ch) || ch === ".") {
          let num = ch;
          i++;
          while (i < cleaned.length && /[\d.]/.test(cleaned[i])) {
            num += cleaned[i];
            i++;
          }
          if ((num.match(/\./g) || []).length > 1 || num === ".") throw new Error("Invalid number");
          tokens.push({ type: "number", value: Number(num) });
          continue;
        }

        if (/[a-z]/i.test(ch)) {
          let word = ch;
          i++;
          while (i < cleaned.length && /[a-z]/i.test(cleaned[i])) {
            word += cleaned[i];
            i++;
          }
          tokens.push({ type: "word", value: word.toLowerCase() });
          continue;
        }

        if ("+-*/^()%".includes(ch)) {
          tokens.push({ type: "op", value: ch });
          i++;
          continue;
        }
        throw new Error("Invalid character");
      }
      return tokens;
    }

    function toRpn(tokens) {
      const output = [];
      const stack = [];
      const precedence = { "+": 1, "-": 1, "*": 2, "/": 2, "%": 2, "^": 3, "u-": 4 };
      const rightAssoc = { "^": true, "u-": true };
      let prev = null;

      for (const token of tokens) {
        if (token.type === "number") {
          output.push(token);
          prev = token;
          continue;
        }

        if (token.type === "word") {
          if (token.value === "pi") output.push({ type: "number", value: Math.PI });
          else if (token.value === "e") output.push({ type: "number", value: Math.E });
          else if (["sqrt", "ln", "log", "abs"].includes(token.value)) stack.push({ type: "func", value: token.value });
          else throw new Error("Unknown function");
          prev = token;
          continue;
        }

        if (token.type === "op" && token.value === "(") {
          stack.push(token);
          prev = token;
          continue;
        }

        if (token.type === "op" && token.value === ")") {
          while (stack.length && !(stack[stack.length - 1].type === "op" && stack[stack.length - 1].value === "(")) {
            output.push(stack.pop());
          }
          if (!stack.length) throw new Error("Mismatched parentheses");
          stack.pop();
          if (stack.length && stack[stack.length - 1].type === "func") output.push(stack.pop());
          prev = token;
          continue;
        }

        if (token.type === "op") {
          let op = token.value;
          if (op === "-" && (!prev || (prev.type === "op" && prev.value !== ")") || prev.type === "func")) op = "u-";
          while (stack.length) {
            const top = stack[stack.length - 1];
            if (top.type === "func") {
              output.push(stack.pop());
              continue;
            }
            if (top.type !== "op" || top.value === "(") break;
            const shouldPop = rightAssoc[op]
              ? precedence[op] < precedence[top.value]
              : precedence[op] <= precedence[top.value];
            if (!shouldPop) break;
            output.push(stack.pop());
          }
          stack.push({ type: "op", value: op });
          prev = token;
        }
      }

      while (stack.length) {
        const top = stack.pop();
        if (top.type === "op" && (top.value === "(" || top.value === ")")) throw new Error("Mismatched parentheses");
        output.push(top);
      }
      return output;
    }

    function evalRpn(rpn) {
      const st = [];

      for (const tk of rpn) {
        if (tk.type === "number") {
          st.push(tk.value);
          continue;
        }

        if (tk.type === "func") {
          if (!st.length) throw new Error("Invalid function");
          const a = st.pop();
          let result = 0;
          if (tk.value === "sqrt") {
            if (a < 0) throw new Error("Math domain error");
            result = Math.sqrt(a);
          } else if (tk.value === "ln") {
            if (a <= 0) throw new Error("Math domain error");
            result = Math.log(a);
          } else if (tk.value === "log") {
            if (a <= 0) throw new Error("Math domain error");
            result = Math.log10(a);
          } else if (tk.value === "abs") {
            result = Math.abs(a);
          }
          st.push(result);
          continue;
        }

        if (tk.type === "op") {
          if (tk.value === "u-") {
            if (!st.length) throw new Error("Invalid expression");
            st.push(-st.pop());
            continue;
          }
          if (st.length < 2) throw new Error("Invalid expression");
          const b = st.pop();
          const a = st.pop();
          let result = 0;

          if (tk.value === "+") result = a + b;
          else if (tk.value === "-") result = a - b;
          else if (tk.value === "*") result = a * b;
          else if (tk.value === "/") {
            if (b === 0) throw new Error("Division by zero");
            result = a / b;
          } else if (tk.value === "%") {
            if (b === 0) throw new Error("Division by zero");
            result = a % b;
          } else if (tk.value === "^") result = Math.pow(a, b);
          st.push(result);
        }
      }

      if (st.length !== 1 || !Number.isFinite(st[0])) throw new Error("Invalid result");
      return st[0];
    }

    function safeEvaluate(expression) {
      const value = evalRpn(toRpn(tokenize(expression)));
      return Number(value.toFixed(12));
    }

    function resolveAndSet(expr) {
      const result = safeEvaluate(expr);
      display.value = String(result);
      lastAnswer = result;
      addToHistory(expr, result);
      return result;
    }

    function calculate() {
      try {
        const expr = display.value.trim();
        if (!expr) return;
        resolveAndSet(expr);
      } catch (error) {
        display.value = "Error";
      }
    }

    function percent() {
      try {
        const expr = display.value.trim();
        if (!expr) return;
        const percentValue = safeEvaluate(expr);
        const baseInput = prompt("¿De qué número quieres sacar ese porcentaje?");
        if (baseInput === null || !baseInput.trim()) return;
        const baseNumber = Number(baseInput);
        if (Number.isNaN(baseNumber)) throw new Error("Invalid base");
        const result = Number(((baseNumber * percentValue) / 100).toFixed(12));
        display.value = String(result);
        lastAnswer = result;
        addToHistory(`${percentValue}% de ${baseNumber}`, result);
      } catch (error) {
        display.value = "Error";
      }
    }

    function sqrtValue() {
      try {
        const expr = display.value.trim();
        if (!expr) return;
        const value = safeEvaluate(expr);
        if (value < 0) throw new Error("Math domain error");
        const result = Number(Math.sqrt(value).toFixed(12));
        display.value = String(result);
        lastAnswer = result;
        addToHistory(`sqrt(${value})`, result);
      } catch (error) {
        display.value = "Error";
      }
    }

    function square() {
      try {
        const expr = display.value.trim();
        if (!expr) return;
        const value = safeEvaluate(expr);
        const result = Number((value * value).toFixed(12));
        display.value = String(result);
        lastAnswer = result;
        addToHistory(`(${value})^2`, result);
      } catch (error) {
        display.value = "Error";
      }
    }

    function cube() {
      try {
        const expr = display.value.trim();
        if (!expr) return;
        const value = safeEvaluate(expr);
        const result = Number((value * value * value).toFixed(12));
        display.value = String(result);
        lastAnswer = result;
        addToHistory(`(${value})^3`, result);
      } catch (error) {
        display.value = "Error";
      }
    }

    function fourthPower() {
      try {
        const expr = display.value.trim();
        if (!expr) return;
        const value = safeEvaluate(expr);
        const result = Number((value * value * value * value).toFixed(12));
        display.value = String(result);
        lastAnswer = result;
        addToHistory(`(${value})^4`, result);
      } catch (error) {
        display.value = "Error";
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key;
      if (/^[0-9]$/.test(key)) return add(key);
      if (["+", "-", "*", "/", "(", ")", ".", "^", "%"].includes(key)) return add(key);
      if (key === "Enter") {
        event.preventDefault();
        return calculate();
      }
      if (key === "Backspace") {
        event.preventDefault();
        return backspace();
      }
      if (key === "Escape") return clearDisplay();
    });

    setRandomBackground();
    setInterval(setRandomBackground, 12000);
  </script>
</body>
  </html>
